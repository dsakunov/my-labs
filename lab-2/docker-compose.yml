version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: teacher-db
    environment:
      POSTGRES_DB: teacherdb
      POSTGRES_USER: teacher
      POSTGRES_PASSWORD: teacher123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data: